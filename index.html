<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="style.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@wcj/markdown-to-html/dist/markdown.min.js"></script>

    <title>Temelín - Wiki</title>
</head>
<body>
    <div class="drawer lg:drawer-open">
    <input id="my-drawer-4" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content">
        <!-- Navbar -->
        <nav class="navbar w-full bg-base-300">
            <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost">
                <!-- Sidebar toggle icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path><path d="M9 4v16"></path><path d="M14 10l2 2l-2 2"></path></svg>
            </label>
            <div class="px-4">Navbar Title</div>
        </nav>
        <div>
            <img class="h-96 w-full object-cover" src="images/background.jpg">
        </div>
        <div class="p-4 grid grid-cols-3">
            <div class="col-span-2 mainpage">
                Welcome to temelín :3
            </div>
            <div>
                <p class="text-2xl text-bold p-4">Update log</p>
                <div id="original-updatelog" class="collapse collapse-arrow bg-base-100 border border-base-300">
                    <input type="radio" name="my-accordion-2" checked="checked" />
                    <div class="collapse-title font-semibold updatelog-version"><p>VERSION 1</p></div>
                    <div class="collapse-content text-sm updatelog-text"><p>KOKOT</p></div>
                </div>
                <script type="text/javascript" defer>
                    async function loadUpdatelog() {
                        const originalUpdatelog = document.getElementById("original-updatelog");

                        try {
                            const response = await fetch("data/updatelog.md");
                            const text = await response?.text();
                            
                            text.split("<UPDATE").forEach((value, i) => {
                                if (i == 0) {
                                    return;
                                }

                                const tagEnd = value.indexOf(">");
                                const version = value.slice(value.indexOf('"') + 1, tagEnd - 1);
                                
                                const updatelogText = value.slice(tagEnd + 3, value.length - 1);

                                const div = originalUpdatelog.cloneNode(true);
                                const versionDiv = div?.getElementsByClassName("updatelog-version")[0];
                                const textDiv = div?.getElementsByClassName("updatelog-text")[0];
                                
                                if (i == 1) {
                                    div.childNodes[1].checked = true
                                }

                                div.id = null;
                                versionDiv.innerHTML = `V${version}`;
                                textDiv.innerHTML = markdown.default(`\`\`\`diff\n${updatelogText}\`\`\``);

                                originalUpdatelog.parentElement.appendChild(div);
                            })

                            originalUpdatelog.remove();
                        } catch(e) {
                            console.error("Failed to read change log!", e);
                        }
                    }

                    loadUpdatelog();

                    /*const str = '# Markdown to HTML\n\nConverts markdown text to HTML.\n\n';
                    const div = document.createElement('div');
                    div.className = 'markdown-body';
                    div.innerHTML = 
                    document.body.appendChild(div)*/
                </script>
            </div>
        </div>
    </div>

    <div class="drawer-side is-drawer-close:overflow-visible">
        <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
        <div class="flex min-h-full flex-col items-start bg-base-200 is-drawer-close:w-14 is-drawer-open:w-64">
        <!-- Sidebar content here -->
        <ul class="menu w-full grow">
            <!-- List item -->
            <li>
            <button class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Homepage">
                <!-- Home icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                <span class="is-drawer-close:hidden">Homepage</span>
            </button>
            </li>

            <!-- List item -->
            <li>
            <button class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Settings">
                <!-- Settings icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M20 7h-9"></path><path d="M14 17H5"></path><circle cx="17" cy="17" r="3"></circle><circle cx="7" cy="7" r="3"></circle></svg>
                <span class="is-drawer-close:hidden">Settings</span>
            </button>
            </li>
        </ul>
        </div>
    </div>
    </div>
</body>
</html>
